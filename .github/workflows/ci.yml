# ABOUTME: CI workflow for pull requests and main branch pushes.
# ABOUTME: Runs linting, type checking, formatting, unit tests, coverage, and mutation testing.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint, format check, and unit tests
        run: make check

      - name: Coverage report (fails under 75%)
        run: make coverage

      - name: Mutation testing (fails if survival rate regresses)
        run: make mutate

      - name: Mutation testing summary
        if: always()
        run: make mutate-report

      - name: Upload coverage and mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/htmlcov/
            build/mutants-marvin.txt
            build/mutants-formatting.txt
