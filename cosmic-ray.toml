# ABOUTME: Cosmic Ray mutation testing configuration for marvin.py.
# ABOUTME: Targets business logic layer with fast unit tests only.

[cosmic-ray]
module-path = "src/amazing_marvin_mcp/marvin.py"
timeout = 30.0
test-command = "python -m pytest tests/test_unit_marvin.py tests/test_formatting.py -x -q --no-header --tb=line"

# BitOr mutations target the `|` in type unions (e.g. `str | None`) which are
# not runtime operators. The justfile applies this filter between init and exec.
[cosmic-ray.filters.operators-filter]
exclude-operators = [
    "core/ReplaceBinaryOperator_BitOr_.*",
    "core/ReplaceComparisonOperator_Eq_Is",
]

[cosmic-ray.distributor]
name = "local"
